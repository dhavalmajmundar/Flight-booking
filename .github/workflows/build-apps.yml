name: Build companion apps

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "client_app/**"
      - ".github/workflows/build-apps.yml"

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: FlightCompanion-Android
          path: client_app/build/app/outputs/flutter-apk/app-release.apk

  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build windows --release
      - shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/FlightCompanion-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: FlightCompanion-Windows
          path: client_app/build/FlightCompanion-Windows.zip
